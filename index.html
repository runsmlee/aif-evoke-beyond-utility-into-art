<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Evoke — Beyond Utility, Into Art. Where functional design meets creative expression." />
    <meta name="theme-color" content="#EF4444" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta property="og:title" content="Evoke — Beyond Utility, Into Art" />
    <meta property="og:description" content="Craft digital tools that don't just work — they inspire. Transform everyday interactions into meaningful experiences." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Evoke — Beyond Utility, Into Art" />
    <meta name="twitter:description" content="Craft digital tools that don't just work — they inspire." />
    <meta property="og:url" content="https://evoke.design" />
    <meta property="og:site_name" content="Evoke" />
    <link rel="canonical" href="https://evoke.design" />
    <title>Evoke — Beyond Utility, Into Art</title>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Evoke",
      "description": "Transform everyday interactions into meaningful experiences. A creative design suite that goes beyond utility into art.",
      "applicationCategory": "DesignApplication",
      "operatingSystem": "Web",
      "offers": [
        { "@type": "Offer", "price": "0", "priceCurrency": "USD", "name": "Starter Plan" },
        { "@type": "Offer", "price": "19", "priceCurrency": "USD", "name": "Pro Plan", "billingIncrement": "P1M" },
        { "@type": "Offer", "price": "49", "priceCurrency": "USD", "name": "Studio Plan", "billingIncrement": "P1M" }
      ]
    }
    </script>
  </head>
  <body class="antialiased">
    <script>
      // Prevent flash of wrong theme — runs before React hydration
      (function() {
        try {
          var stored = localStorage.getItem('evoke-theme');
          if (stored === 'dark' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }
        } catch(e) {}
      })();
    </script>
    <div id="root"></div>
    <noscript>
      <div style="padding:2rem;text-align:center;font-family:system-ui,sans-serif">
        <h1 style="font-size:1.5rem;font-weight:700;margin-bottom:0.5rem">Evoke — Beyond Utility, Into Art</h1>
        <p>Evoke requires JavaScript to run. Please enable JavaScript in your browser settings.</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
